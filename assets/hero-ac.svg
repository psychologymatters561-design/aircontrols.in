<svg viewBox="0 0 620 520" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e50"/>
      <stop offset="100%" stop-color="#0d1e38"/>
    </linearGradient>
    <linearGradient id="streamGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7db5e8" stop-opacity=".75"/>
      <stop offset="60%" stop-color="#a8d4f0" stop-opacity=".40"/>
      <stop offset="100%" stop-color="#c8ecff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="streamGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity=".6"/>
      <stop offset="55%" stop-color="#7db5e8" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#c8ecff" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="unit-shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#061020" flood-opacity=".55"/>
    </filter>
    <filter id="ice-glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="unit-clip">
      <rect x="18" y="18" width="580" height="148" rx="18"/>
    </clipPath>
  </defs>

  <!-- ===== UNIT BODY ===== -->
  <rect x="18" y="18" width="580" height="148" rx="18" fill="url(#bodyGrad)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" filter="url(#unit-shadow)"/>

  <!-- Top highlight line -->
  <rect x="28" y="20" width="560" height="3" rx="2" fill="rgba(255,255,255,0.07)"/>
  <!-- Bottom edge highlight -->
  <rect x="18" y="162" width="580" height="4" rx="2" fill="rgba(0,0,0,0.3)"/>

  <!-- ===== INTAKE GRILLE (left 70%) ===== -->
  <rect x="26" y="28" width="394" height="110" rx="8" fill="rgba(0,0,0,0.25)" clip-path="url(#unit-clip)"/>
  <!-- Grille horizontal slats -->
  <line x1="30" y1="44" x2="416" y2="44" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="56" x2="416" y2="56" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="68" x2="416" y2="68" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="80" x2="416" y2="80" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="92" x2="416" y2="92" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="104" x2="416" y2="104" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="116" x2="416" y2="116" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>
  <line x1="30" y1="128" x2="416" y2="128" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- Brand name on grille -->
  <text x="50" y="72" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="rgba(255,255,255,0.55)" letter-spacing="3.5">AIR CONTROL</text>
  <text x="50" y="90" font-family="sans-serif" font-size="8.5" fill="rgba(200,168,75,0.5)" letter-spacing="2.5">DELHI NCR · SINCE 1987</text>

  <!-- Snowflake logo badge on grille -->
  <circle cx="360" cy="74" r="22" fill="rgba(74,144,217,0.1)" stroke="rgba(74,144,217,0.2)"/>
  <text x="360" y="81" text-anchor="middle" font-size="22" fill="rgba(122,185,232,0.7)" filter="url(#soft-glow)">❄</text>

  <!-- ===== CONTROL PANEL (right 30%) ===== -->
  <rect x="428" y="26" width="162" height="132" rx="12" fill="rgba(6,14,26,0.65)" stroke="rgba(200,168,75,0.12)" stroke-width="1"/>

  <!-- Digital temperature display -->
  <rect x="438" y="34" width="142" height="52" rx="7" fill="rgba(0,0,0,0.5)" stroke="rgba(74,144,217,0.2)"/>
  <!-- Display background scanlines -->
  <line x1="440" y1="40" x2="578" y2="40" stroke="rgba(74,144,217,0.04)" stroke-width="1"/>
  <line x1="440" y1="48" x2="578" y2="48" stroke="rgba(74,144,217,0.04)" stroke-width="1"/>
  <line x1="440" y1="56" x2="578" y2="56" stroke="rgba(74,144,217,0.04)" stroke-width="1"/>
  <line x1="440" y1="64" x2="578" y2="64" stroke="rgba(74,144,217,0.04)" stroke-width="1"/>
  <line x1="440" y1="72" x2="578" y2="72" stroke="rgba(74,144,217,0.04)" stroke-width="1"/>
  <!-- Temperature value -->
  <text x="509" y="73" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="30" font-weight="bold" fill="#4a90d9" filter="url(#soft-glow)">18°C</text>

  <!-- Status indicator row -->
  <!-- Power LED (blue, pulsing) -->
  <circle cx="450" cy="100" r="5.5" fill="#4a90d9" filter="url(#soft-glow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5.5;6.5;5.5" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="462" y="104" font-family="sans-serif" font-size="8" fill="rgba(74,144,217,0.65)" letter-spacing="1">COOLING</text>

  <!-- Fan mode icon -->
  <circle cx="450" cy="120" r="5" fill="rgba(200,168,75,0.4)">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="3.5s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <text x="462" y="124" font-family="sans-serif" font-size="8" fill="rgba(200,168,75,0.5)" letter-spacing="1">AUTO FAN</text>

  <!-- Timer dot -->
  <circle cx="450" cy="140" r="4" fill="rgba(255,255,255,0.15)"/>
  <text x="462" y="144" font-family="sans-serif" font-size="8" fill="rgba(255,255,255,0.25)" letter-spacing="1">TIMER</text>

  <!-- ===== OUTLET / LOUVRES (bottom of unit) ===== -->
  <rect x="18" y="152" width="580" height="14" rx="0" fill="rgba(0,0,0,0.3)"/>

  <!-- Louvre slats (3 rows, each with subtle rotation animation) -->
  <rect class="louvre" x="26" y="153" width="568" height="4" rx="2" fill="rgba(255,255,255,0.18)">
    <animateTransform attributeName="transform" type="rotate" values="0 310 155;7 310 155;0 310 155" dur="5s" repeatCount="indefinite"/>
  </rect>
  <rect class="louvre" x="26" y="159" width="568" height="4" rx="2" fill="rgba(255,255,255,0.12)">
    <animateTransform attributeName="transform" type="rotate" values="0 310 161;7 310 161;0 310 161" dur="5s" begin="0.5s" repeatCount="indefinite"/>
  </rect>
  <rect class="louvre" x="26" y="164" width="568" height="4" rx="2" fill="rgba(255,255,255,0.07)">
    <animateTransform attributeName="transform" type="rotate" values="0 310 166;7 310 166;0 310 166" dur="5s" begin="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ===== COOL AIR FLOW STREAMS (stroke-dashoffset animation) ===== -->
  <!-- Stream 1 (leftmost) -->
  <path d="M 65 168 C 60 195 72 215 62 248 C 54 274 68 295 60 328 C 54 352 68 372 62 400" stroke="url(#streamGrad1)" stroke-width="2.5" stroke-dasharray="240" stroke-dashoffset="240" fill="none">
    <animate attributeName="stroke-dashoffset" from="240" to="-240" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 2 -->
  <path d="M 140 168 C 135 192 148 210 138 242 C 130 266 143 285 136 316 C 130 340 143 358 138 386" stroke="url(#streamGrad2)" stroke-width="2" stroke-dasharray="220" stroke-dashoffset="220" fill="none">
    <animate attributeName="stroke-dashoffset" from="220" to="-220" dur="2.7s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="2.7s" begin="0.3s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 3 (center-left) -->
  <path d="M 225 168 C 220 190 232 208 224 238 C 218 260 230 278 224 307 C 218 330 230 348 225 374" stroke="url(#streamGrad1)" stroke-width="3" stroke-dasharray="210" stroke-dashoffset="210" fill="none">
    <animate attributeName="stroke-dashoffset" from="210" to="-210" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="2.2s" begin="0.6s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 4 (center) -->
  <path d="M 308 168 C 303 188 315 206 308 235 C 302 256 314 274 308 302 C 303 324 314 342 308 368" stroke="url(#streamGrad2)" stroke-width="2.5" stroke-dasharray="200" stroke-dashoffset="200" fill="none">
    <animate attributeName="stroke-dashoffset" from="200" to="-200" dur="2.5s" begin="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0.85;0" dur="2.5s" begin="0.9s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 5 (center-right) -->
  <path d="M 390 168 C 385 188 397 205 390 233 C 385 254 396 271 390 298 C 385 320 396 337 390 362" stroke="url(#streamGrad1)" stroke-width="2" stroke-dasharray="195" stroke-dashoffset="195" fill="none">
    <animate attributeName="stroke-dashoffset" from="195" to="-195" dur="2.3s" begin="1.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="2.3s" begin="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 6 (right) -->
  <path d="M 465 168 C 460 186 472 202 465 229 C 460 250 470 266 465 292 C 460 313 470 330 465 354" stroke="url(#streamGrad2)" stroke-width="2" stroke-dasharray="185" stroke-dashoffset="185" fill="none">
    <animate attributeName="stroke-dashoffset" from="185" to="-185" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.7;0.7;0" dur="2.6s" begin="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Stream 7 (wide right edge) -->
  <path d="M 540 168 C 535 184 546 198 540 223 C 535 242 545 258 540 282" stroke="url(#streamGrad1)" stroke-width="1.5" stroke-dasharray="115" stroke-dashoffset="115" fill="none">
    <animate attributeName="stroke-dashoffset" from="115" to="-115" dur="2.1s" begin="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0.6;0" dur="2.1s" begin="1.8s" repeatCount="indefinite"/>
  </path>

  <!-- ===== SNOWFLAKES (scattered, CSS-animated via class) ===== -->
  <!-- Near unit top -->
  <text x="16" y="52" class="svgflake sf1" font-size="13" fill="rgba(122,185,232,0.55)" filter="url(#soft-glow)">❄</text>
  <text x="498" y="40" class="svgflake sf2" font-size="11" fill="rgba(160,210,240,0.45)">❄</text>
  <text x="596" y="72" class="svgflake sf3" font-size="15" fill="rgba(122,185,232,0.35)">❄</text>
  <!-- Mid-stream zone -->
  <text x="26" y="240" class="svgflake sf4" font-size="10" fill="rgba(160,210,240,0.35)">❄</text>
  <text x="178" y="290" class="svgflake sf1" font-size="12" fill="rgba(122,185,232,0.30)">❄</text>
  <text x="420" y="260" class="svgflake sf2" font-size="9" fill="rgba(160,210,240,0.28)">❄</text>
  <text x="580" y="310" class="svgflake sf3" font-size="14" fill="rgba(122,185,232,0.22)">❄</text>
  <text x="86" y="370" class="svgflake sf4" font-size="11" fill="rgba(160,210,240,0.20)">❄</text>
  <text x="500" y="390" class="svgflake sf1" font-size="8" fill="rgba(122,185,232,0.18)">❄</text>

  <!-- ===== COLD MIST / FOG at bottom ===== -->
  <ellipse cx="310" cy="450" rx="280" ry="36" fill="rgba(122,185,232,0.05)" filter="url(#ice-glow)"/>
  <ellipse cx="310" cy="470" rx="220" ry="28" fill="rgba(122,185,232,0.04)" filter="url(#ice-glow)"/>
  <ellipse cx="310" cy="488" rx="160" ry="22" fill="rgba(122,185,232,0.03)" filter="url(#ice-glow)"/>

  <!-- ===== MOUNTING SCREWS (realism detail) ===== -->
  <circle cx="36" cy="36" r="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="580" cy="36" r="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="36" cy="148" r="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <circle cx="580" cy="148" r="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>
