<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Air Control | HVAC Experts Delhi NCR</title>

<meta name="description" content="Premium HVAC solutions in Delhi NCR">

<!-- FONTS -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:'Inter',sans-serif;
  background:#0a1628;
  color:#fff;
  overflow-x:hidden;
}

/* ===== VARIABLES ===== */
:root {
  --navy:#0a1628;
  --gold:#c8a84b;
  --light:#eef2f8;
}

/* ===== CONTAINER ===== */
.container {
  max-width:1200px;
  margin:auto;
  padding:0 20px;
}

/* ===== NAV ===== */
.nav {
  position:fixed;
  top:0;
  width:100%;
  background:#060e1a;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.nav a {
  margin:0 10px;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  flex-direction:column;
}

.hero h1 {
  font-size:60px;
  font-family:'Playfair Display',serif;
}

.hero button {
  margin-top:20px;
  padding:12px 20px;
  background:var(--gold);
  border:none;
  cursor:pointer;
}

/* ===== SECTION ===== */
.section {
  padding:100px 0;
}

</style>

</head>

<body>

<!-- NAV -->
<div class="nav">
  <div>Air Control</div>
  <div>
    <a onclick="scrollToSection('home')">Home</a>
    <a onclick="scrollToSection('services')">Services</a>
    <a onclick="scrollToSection('contact')">Contact</a>
  </div>
</div>

<!-- HERO -->
<section id="home" class="hero">
  <h1>Precision HVAC Engineering</h1>
  <p>20+ Years • 500+ Projects</p>
  <button onclick="openChat()">Get Consultation</button>
</section>

<!-- SERVICES (placeholder) -->
<section id="services" class="section container">
  <h2>Services Coming</h2>
</section>

<!-- CONTACT -->
<section id="contact" class="section container">
  <h2>Contact</h2>
</section>

<!-- CHATBOT -->
<div id="chatWidget" style="display:none;"></div>

<script>

/* NAVIGATION */
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* CHAT PLACEHOLDER */
function openChat(){
  alert("Chat will open soon");
}

</script>

</body>
</html>
